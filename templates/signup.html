
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseQuest — Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="scanlines"></div>
<div class="stars" id="stars"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">⚔️</div>
        <h1 class="auth-title">ExpenseQuest</h1>
        <p class="auth-subtitle">CREATE YOUR ACCOUNT</p>

        <div class="form-group">
            <input type="text" id="username" placeholder="Choose username" />
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Choose password" />
        </div>
        <div class="form-group">
            <input type="password" id="confirmPassword" placeholder="Confirm password" />
        </div>

        <p class="error-msg" id="errorMsg"></p>
        <p class="success-msg" id="successMsg"></p>

        <button class="add-btn" onclick="handleSignup()">CREATE ACCOUNT</button>

        <p class="auth-switch">
            Already have an account? <a href="/login">LOGIN</a>
        </p>
    </div>
</div>

<script>
    // Stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
        star.style.setProperty('--opacity', (0.3 + Math.random() * 0.7).toString());
        container.appendChild(star);
    }

    async function handleSignup() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.textContent = '';
        successMsg.textContent = '';

        if (!username || !password || !confirmPassword) {
            errorMsg.textContent = '⚠ FILL ALL FIELDS';
            return;
        }

        if (password !== confirmPassword) {
            errorMsg.textContent = '⚠ PASSWORDS DO NOT MATCH';
            return;
        }

        if (password.length < 6) {
            errorMsg.textContent = '⚠ PASSWORD MIN 6 CHARACTERS';
            return;
        }

        const res = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (data.success) {
            successMsg.textContent = '✓ ACCOUNT CREATED! REDIRECTING...';
            setTimeout(() => window.location.href = '/login', 1500);
        } else {
            errorMsg.textContent = '⚠ ' + data.message.toUpperCase();
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSignup();
    });
</script>
</body>
</html>
