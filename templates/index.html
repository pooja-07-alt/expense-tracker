<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseQuest 🎮</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <!-- Header -->
    <header class="hud-header">
        <div class="hud-title">
            <span class="title-icon">⚔️</span>
            <h1>ExpenseQuest</h1>
            <span class="title-badge">LIVE</span>
        </div>
        <div class="hud-stats">
            <div class="stat-chip">
                <span class="stat-label">LEVEL</span>
                <span class="stat-value" id="playerLevel">1</span>
            </div>
            <div class="stat-chip">
                <span class="stat-label">STREAK</span>
                <span class="stat-value" id="streakCount">0</span>
            </div>
            <div class="stat-chip">
                <span class="stat-label">RANK</span>
                <span class="stat-value" id="playerRank">ROOKIE</span>
            </div>
        </div>
    </header>

    <!-- Main Grid -->
    <div class="main-grid">

        <!-- Left Column -->
        <div class="left-col">

            <!-- Add Expense -->
            <div class="card form-card">
                <div class="card-label">⚡ NEW ENTRY</div>
                <div class="form-group">
                    <input type="text" id="title" placeholder="Mission name..." />
                </div>
                <div class="form-group">
                    <input type="number" id="amount" placeholder="Gold spent (₹)" />
                </div>
                <div class="form-group">
                    <select id="category">
                        <option value="Food">🍔 Food</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Entertainment">🎮 Entertainment</option>
                        <option value="Health">💊 Health</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
                <button onclick="addExpense()" class="add-btn">+ LOG EXPENSE</button>
            </div>

            <!-- Budget -->
            <div class="card budget-card">
                <div class="card-label">🏆 BUDGET XP</div>
                <div class="total-display">
                    <span class="currency">₹</span>
                    <span id="total">0</span>
                </div>
                <div class="xp-bar-wrapper">
                    <div class="xp-labels">
                        <span>0</span>
                        <span id="budgetLabel">Set budget to track XP</span>
                    </div>
                    <div class="xp-track">
                        <div class="xp-fill" id="progressBar"></div>
                    </div>
                    <p class="budget-status" id="budgetStatus"></p>
                </div>
                <div class="budget-set-row">
                    <input type="number" id="budgetInput" placeholder="Set monthly budget..." />
                    <button onclick="setBudget()" class="set-btn">SET</button>
                </div>
            </div>

        </div>

        <!-- Right Column -->
        <div class="right-col">

            <!-- Mini Stats -->
            <div class="stats-row">
                <div class="card mini-stat">
                    <div class="mini-label">TODAY</div>
                    <div class="mini-value" id="todayTotal">₹0</div>
                </div>
                <div class="card mini-stat">
                    <div class="mini-label">ENTRIES</div>
                    <div class="mini-value" id="entryCount">0</div>
                </div>
                <div class="card mini-stat">
                    <div class="mini-label">TOP CAT</div>
                    <div class="mini-value" id="topCategory">—</div>
                </div>
            </div>

            <!-- Chart -->
            <div class="card chart-card">
                <div class="card-label">📊 INTEL MAP</div>
                <canvas id="expenseChart"></canvas>
            </div>

        </div>
    </div>

    <!-- Mission Log -->
    <div class="card list-card">
        <div class="list-header">
            <div class="card-label">📋 MISSION LOG</div>
            <input type="text" id="searchInput" placeholder="🔍 Search missions..." oninput="searchExpenses()" class="search-input" />
        </div>
        <ul id="expenseList"></ul>
    </div>

</div>

<div class="toast" id="toast"></div>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
