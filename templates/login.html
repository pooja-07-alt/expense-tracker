
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseQuest — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>



<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">⚔️</div>
        <h1 class="auth-title">ExpenseQuest</h1>
        <p class="auth-subtitle">LOGIN TO YOUR ACCOUNT</p>

        <div class="form-group">
            <input type="text" id="username" placeholder="Username" />
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Password" />
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button class="add-btn" onclick="handleLogin()">LOGIN</button>

        <p class="auth-switch">
            No account? <a href="/signup">SIGN UP</a>
        </p>
    </div>
</div>

<script>
    // Stars


    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        if (!username || !password) {
            errorMsg.textContent = '⚠ FILL ALL FIELDS';
            return;
        }

        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (data.success) {
            window.location.href = '/';
        } else {
            errorMsg.textContent = '⚠ ' + data.message.toUpperCase();
        }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>
</body>
</html>
